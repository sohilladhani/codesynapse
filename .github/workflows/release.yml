name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload binaries to (e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codesynapse-linux-x86_64
            binary: codesynapse
            upx: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: codesynapse-macos-aarch64
            binary: codesynapse
            upx: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codesynapse-windows-x86_64.exe
            binary: codesynapse.exe
            upx: true

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p codesynapse-cli

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Compress with UPX
        if: matrix.upx
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: ${{ matrix.artifact }}
          args: --best

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
